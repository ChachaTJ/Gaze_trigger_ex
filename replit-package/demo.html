<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Head Tracking Demo (Replit Ready)</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* ========== Gaze Cursor ========== */
        #gaze-cursor {
            position: fixed;
            width: 28px;
            height: 28px;
            background: rgba(123, 237, 159, 0.5);
            border: 3px solid #7bed9f;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9998;
            display: none;
            box-shadow: 0 0 20px rgba(123, 237, 159, 0.5);
            transition: transform 0.1s;
        }

        #gaze-cursor.clicking {
            background: rgba(255, 71, 87, 0.8);
            border-color: #ff4757;
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
        }

        /* ========== Status Bar ========== */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4757;
        }

        .status-dot.active {
            background: #7bed9f;
        }

        .status-dot.loading {
            background: #ffa502;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ========== Control Buttons ========== */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .ht-btn {
            padding: 12px 22px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .ht-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .ht-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ht-btn.primary {
            background: #7bed9f;
            color: #1a1a2e;
            border-color: #7bed9f;
            font-weight: 600;
        }

        .ht-btn.toggle {
            background: rgba(255, 165, 2, 0.2);
            border-color: #ffa502;
            color: #ffa502;
        }

        .ht-btn.toggle.active {
            background: #ffa502;
            color: #1a1a2e;
        }

        /* ========== Info Display ========== */
        .gaze-info {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 25px;
            font-family: 'Courier New', monospace;
        }

        .gaze-coords {
            color: #7bed9f;
            font-size: 16px;
        }

        .mouth-ratio {
            color: #ffa502;
            margin-left: 30px;
        }

        /* ========== Action Cards ========== */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .action-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-card.gaze-hover {
            border-color: #7bed9f;
            box-shadow: 0 0 25px rgba(123, 237, 159, 0.3);
        }

        .action-card.triggered {
            background: #7bed9f !important;
            transform: scale(0.95);
        }

        .action-card.triggered * {
            color: #1a1a2e !important;
        }

        .action-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .action-label {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .action-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Dwell Ring Animation */
        .dwell-ring {
            position: absolute;
            inset: 4px;
            border: 3px solid transparent;
            border-radius: 14px;
            pointer-events: none;
        }

        .action-card.dwelling .dwell-ring {
            border-color: #7bed9f;
            animation: dwell-fill 3s linear forwards;
        }

        @keyframes dwell-fill {
            0% {
                clip-path: polygon(50% 0%, 50% 0%, 50% 50%, 50% 50%);
            }

            25% {
                clip-path: polygon(50% 0%, 100% 0%, 100% 50%, 50% 50%);
            }

            50% {
                clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 50% 50%);
            }

            75% {
                clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0% 100%, 50% 50%);
            }

            100% {
                clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%);
            }
        }

        /* ========== Instructions ========== */
        .instructions {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            line-height: 1.8;
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <!-- Gaze Cursor -->
    <div id="gaze-cursor"></div>

    <div class="container">
        <h1>🎯 Head Tracking Demo</h1>
        <p class="subtitle">Human.js 기반 머리 움직임 마우스 제어 • 입 벌림 클릭</p>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot" id="head-status"></span>
                <span id="head-status-text">Head Tracking: Off</span>
            </div>
            <div class="status-item">
                <span class="status-dot" id="mouth-status"></span>
                <span id="mouth-status-text">Mouth Click: Off</span>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <button class="ht-btn primary" id="start-btn">🎯 Start Head Tracking</button>
            <button class="ht-btn" id="calibrate-btn" disabled>⚙️ Calibrate (Alt+H)</button>
            <button class="ht-btn" id="mouth-cal-btn" disabled>👄 Mouth Cal (Alt+M)</button>
            <button class="ht-btn toggle" id="mouth-toggle-btn" disabled>👄 Mouth Click: Off</button>
        </div>

        <!-- Gaze Info -->
        <div class="gaze-info">
            <span class="gaze-coords">Position: <span id="gaze-x">---</span>, <span id="gaze-y">---</span></span>
            <span class="mouth-ratio" id="mouth-ratio">Mouth: --</span>
        </div>

        <!-- Action Cards -->
        <div class="action-grid">
            <div class="action-card" id="card-select" data-action="select" data-dwell="true">
                <div class="dwell-ring"></div>
                <div class="action-icon">✅</div>
                <div class="action-label">Select</div>
                <div class="action-hint">⏱️ 3초 응시 • 입 벌림</div>
            </div>

            <div class="action-card" id="card-back" data-action="back">
                <div class="dwell-ring"></div>
                <div class="action-icon">↩️</div>
                <div class="action-label">Back</div>
                <div class="action-hint">입 벌림 클릭</div>
            </div>

            <div class="action-card" id="card-scroll" data-action="scroll">
                <div class="dwell-ring"></div>
                <div class="action-icon">⬇️</div>
                <div class="action-label">Scroll</div>
                <div class="action-hint">입 벌림 클릭</div>
            </div>

            <div class="action-card" id="card-home" data-action="home">
                <div class="dwell-ring"></div>
                <div class="action-icon">🏠</div>
                <div class="action-label">Home</div>
                <div class="action-hint">입 벌림 클릭</div>
            </div>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <p>🎯 <strong>Head Tracking:</strong> 머리를 움직여 커서를 제어합니다. <kbd>Alt+H</kbd>로 캘리브레이션</p>
            <p>👄 <strong>Mouth Click:</strong> 입을 벌려서 클릭! <kbd>Alt+M</kbd>으로 캘리브레이션</p>
        </div>
    </div>

    <!-- Head Tracker Module -->
    <script type="module">
        import HeadTracker from './head_tracker_cdn.js';
        window.HeadTracker = HeadTracker;

        // ============ Config ============
        const CONFIG = { DWELL_TIME: 3000, GAZE_TOLERANCE: 30 };
        let activeCard = null;
        let dwellTimer = null;

        // ============ Elements ============
        const cursor = document.getElementById('gaze-cursor');
        const startBtn = document.getElementById('start-btn');
        const calibrateBtn = document.getElementById('calibrate-btn');
        const mouthCalBtn = document.getElementById('mouth-cal-btn');
        const mouthToggleBtn = document.getElementById('mouth-toggle-btn');
        const headStatus = document.getElementById('head-status');
        const headStatusText = document.getElementById('head-status-text');
        const mouthStatus = document.getElementById('mouth-status');
        const mouthStatusText = document.getElementById('mouth-status-text');

        // ============ Start Head Tracking ============
        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Loading...';
            headStatus.classList.add('loading');
            headStatusText.textContent = 'Loading models...';

            try {
                await HeadTracker.init();
                await HeadTracker.start();

                startBtn.textContent = '✅ Tracking Active';
                calibrateBtn.disabled = false;
                mouthCalBtn.disabled = false;
                mouthToggleBtn.disabled = false;
                headStatus.classList.remove('loading');
                headStatus.classList.add('active');
                headStatusText.textContent = 'Head Tracking: On';
                cursor.style.display = 'block';

                // Point events
                HeadTracker.on('point', (x, y) => {
                    cursor.style.left = x + 'px';
                    cursor.style.top = y + 'px';
                    document.getElementById('gaze-x').textContent = Math.round(x);
                    document.getElementById('gaze-y').textContent = Math.round(y);
                    checkGazeTargets(x, y);
                });

                // Mouth ratio
                HeadTracker.on('mouthRatio', (ratio) => {
                    document.getElementById('mouth-ratio').textContent = `Mouth: ${(ratio * 100).toFixed(0)}%`;
                });

                // Mouth click
                HeadTracker.on('mouthClick', () => {
                    cursor.classList.add('clicking');
                    setTimeout(() => cursor.classList.remove('clicking'), 200);
                    if (activeCard) triggerAction(activeCard.dataset.action, 'mouth');
                });

                updateMouthStatus();

            } catch (error) {
                startBtn.textContent = '❌ Error: ' + error.message;
                startBtn.disabled = false;
                headStatus.classList.remove('loading');
            }
        });

        // ============ Button Handlers ============
        calibrateBtn.addEventListener('click', () => {
            if (typeof HeadCalibration !== 'undefined') HeadCalibration.start();
        });

        mouthCalBtn.addEventListener('click', () => {
            if (typeof MouthCalibration !== 'undefined') MouthCalibration.start();
        });

        mouthToggleBtn.addEventListener('click', () => {
            const enabled = !HeadTracker.getMouthClickEnabled();
            HeadTracker.setMouthClickEnabled(enabled);
            updateMouthStatus();
        });

        function updateMouthStatus() {
            const enabled = HeadTracker.getMouthClickEnabled();
            mouthToggleBtn.textContent = `👄 Mouth Click: ${enabled ? 'On' : 'Off'}`;
            mouthToggleBtn.classList.toggle('active', enabled);
            mouthStatus.classList.toggle('active', enabled);
            mouthStatusText.textContent = `Mouth Click: ${enabled ? 'On' : 'Off'}`;
        }

        // ============ Gaze Targets (Dwell Click) ============
        function checkGazeTargets(x, y) {
            const cards = document.querySelectorAll('.action-card');
            let foundCard = null;

            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const inBounds = x >= rect.left - CONFIG.GAZE_TOLERANCE &&
                    x <= rect.right + CONFIG.GAZE_TOLERANCE &&
                    y >= rect.top - CONFIG.GAZE_TOLERANCE &&
                    y <= rect.bottom + CONFIG.GAZE_TOLERANCE;
                if (inBounds) foundCard = card;
                card.classList.remove('gaze-hover', 'dwelling');
            });

            if (foundCard !== activeCard) {
                if (dwellTimer) { clearTimeout(dwellTimer); dwellTimer = null; }
                activeCard = foundCard;
                if (foundCard) {
                    foundCard.classList.add('gaze-hover');
                    if (foundCard.dataset.dwell === 'true') startDwell(foundCard);
                }
            }
        }

        function startDwell(card) {
            card.classList.add('dwelling');
            dwellTimer = setTimeout(() => {
                triggerAction(card.dataset.action, 'dwell');
                card.classList.remove('dwelling');
            }, CONFIG.DWELL_TIME);
        }

        function triggerAction(action, source) {
            console.log(`🎯 Action: ${action} (via ${source})`);
            const card = document.getElementById(`card-${action}`);
            if (!card) return;

            card.classList.add('triggered');
            setTimeout(() => card.classList.remove('triggered', 'gaze-hover', 'dwelling'), 400);

            switch (action) {
                case 'select': console.log('Selected!'); break;
                case 'back': console.log('Going back...'); break;
                case 'scroll': window.scrollBy({ top: 200, behavior: 'smooth' }); break;
                case 'home': window.scrollTo({ top: 0, behavior: 'smooth' }); break;
            }
        }
    </script>

    <!-- Calibration Scripts (Optional) -->
    <script src="head_calibration.js"></script>
    <script src="mouth_calibration.js"></script>
</body>

</html>
