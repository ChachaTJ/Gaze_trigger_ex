<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 Voice Control (Glassmorphism)</title>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            /* Deep Ocean */
            min-height: 100vh;
            color: rgba(255, 255, 255, 0.9);
            /* Text White */
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            width: 100%;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1em;
        }

        /* Main Container */
        .main {
            width: 100%;
            max-width: 1000px;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Control Panel (Mic Button) */
        .control-panel {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .mic-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .mic-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Active Mic State (Alert Red Pulse) */
        .mic-btn.active {
            background: #ff4757;
            /* Alert Red */
            border-color: #ff4757;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 71, 87, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
            }
        }

        /* Action Grid */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            /* Glass White */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Active Trigger State (Neon Mint) */
        .card.active {
            background: #7bed9f;
            /* Neon Mint */
            color: #1e3c72;
            /* Deep Ocean Text */
            border-color: #7bed9f;
            transform: scale(1.05);
            /* Pop */
            box-shadow: 0 0 40px rgba(123, 237, 159, 0.5);
            /* Glow */
            z-index: 10;
        }

        .card.active .label,
        .card.active .hint,
        .card.active .icon {
            color: #1e3c72;
        }

        .icon {
            font-size: 3.5em;
            margin-bottom: 15px;
            display: block;
        }

        .label {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .hint {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
            display: block;
        }

        /* Phoneme Stream */
        .stream-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .stream-title {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
        }

        .phoneme-stream {
            min-height: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
        }

        .phoneme-tag {
            color: #7bed9f;
            /* Neon Mint */
            border: 1px solid rgba(123, 237, 159, 0.5);
            background: rgba(123, 237, 159, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            margin: 0 4px;
            display: inline-block;
        }

        /* Instructions */
        .footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>👁️ Voice Interface Demo</h1>
        <p>Pure voice control implementation of the Design System</p>
    </div>

    <div class="main">
        <div class="control-panel">
            <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎤 Start Voice</button>
        </div>

        <div class="action-grid">
            <!-- Select -->
            <div id="card-select" class="card" data-trigger="AY">
                <span class="icon">✅</span>
                <span class="label">Select</span>
                <span class="hint">Say "Eye" (AY)</span>
            </div>

            <!-- Back -->
            <div id="card-back" class="card" data-trigger="AW">
                <span class="icon">↩️</span>
                <span class="label">Back</span>
                <span class="hint">Say "Ow" (AW)</span>
            </div>

            <!-- Scroll -->
            <div id="card-scroll" class="card" data-trigger="UW">
                <span class="icon">⬇️</span>
                <span class="label">Scroll</span>
                <span class="hint">Say "Ooo" (UW)</span>
            </div>

            <!-- Home -->
            <div id="card-home" class="card" data-trigger="Y">
                <span class="icon">🏠</span>
                <span class="label">Home</span>
                <span class="hint">Say "Ye" (Y)</span>
            </div>
        </div>

        <div class="stream-box">
            <div class="stream-title">Real-Time Phoneme Stream</div>
            <div id="phoneme-stream" class="phoneme-stream"></div>
        </div>
    </div>

    <div class="footer">
        Speak the vowel sound clearly to trigger the action.
    </div>

    <script>
        const socket = io(); // Connects to same host/port
        const btn = document.getElementById('mic-btn');
        const streamDiv = document.getElementById('phoneme-stream');

        let isListening = false;

        // --- 1. whisper.cpp controls (no browser audio capture needed) ---
        function toggleMic() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            // whisper.cpp is already running and capturing audio
            // Just update UI to show we're listening
            isListening = true;
            btn.innerHTML = '⏹ Stop Voice';
            btn.classList.add('active'); // Pulse animation
            streamDiv.innerHTML = '<span class="phoneme-tag">🎤 Listening...</span>';
        }

        function stopListening() {
            isListening = false;
            btn.innerHTML = '🎤 Start Voice';
            btn.classList.remove('active');
            streamDiv.innerHTML = '<span class="phoneme-tag">Press to start</span>';
        }

        // Auto-start listening since whisper.cpp is already running
        socket.on('connect', () => {
            console.log('Connected to server');
            startListening();
        });

        // --- 2. Socket Events & Logic ---
        const TRIGGER_MAP = {
            'AY': 'card-select',
            'AW': 'card-back',
            'UW': 'card-scroll',
            'Y': 'card-home'
        };

        socket.on('result', (data) => {
            if (data.phonemes) {
                // Render Tags
                const pList = data.phonemes.split(' ');
                streamDiv.innerHTML = pList.map(p =>
                    `<span class="phoneme-tag">${p}</span>`
                ).join('');

                // Check for Triggers (last 2 phonemes)
                const recent = pList.slice(-2);
                recent.forEach(p => {
                    if (TRIGGER_MAP[p]) {
                        triggerVisual(TRIGGER_MAP[p]);
                        // Execute logic (mock)
                        console.log("Triggered:", TRIGGER_MAP[p]);
                    }
                });
            }
        });

        // --- 3. Visual Trigger Effect ---
        function triggerVisual(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;

            // Activate
            el.classList.add('active');

            // Auto-reset
            setTimeout(() => {
                el.classList.remove('active');
            }, 800);
        }
    </script>
</body>

</html>
